# ~/.config/tmux/tmux.conf — cohabitation with WezTerm

# ─── General ────────────────────────────────────────────────────────────────
set -g default-terminal "tmux-256color"
set -as terminal-features ",*:RGB"          # truecolor (WezTerm)
set -g mouse on
set -g base-index 1                          # windows numbered from 1
setw -g pane-base-index 1
set -g renumber-windows on                   # renumber on close
set -g mode-keys vi                           # vi copy mode

# ─── Prefix: Ctrl+Space (Ctrl+a left free for readline/shell) ───────────────
unbind C-b
set -g prefix C-Space
bind C-Space send-prefix                     # Ctrl+Space Ctrl+Space = literal

# ─── Bindings (on top of tmux defaults) ─────────────────────────────────────
# Splits and new window open in the current directory
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"
bind c new-window -c "#{pane_current_path}"  # new window
bind X kill-pane                             # used by WezTerm's Cmd+w routing
bind r source-file ~/.config/tmux/tmux.conf \; display-message "Config reloaded"  # reload config

# Pane navigation (prefix + arrow, sent by WezTerm's Cmd+arrows): stop at the
# window edge instead of wrapping to the opposite pane
bind -r Up    if -F "#{pane_at_top}"    "" "select-pane -U"
bind -r Down  if -F "#{pane_at_bottom}" "" "select-pane -D"
bind -r Left  if -F "#{pane_at_left}"   "" "select-pane -L"
bind -r Right if -F "#{pane_at_right}"  "" "select-pane -R"

# Mouse wheel: 1 line per notch (smoother scroll)
bind -T copy-mode-vi WheelUpPane   select-pane \; send-keys -X -N 1 scroll-up
bind -T copy-mode-vi WheelDownPane select-pane \; send-keys -X -N 1 scroll-down

# ─── Recede inactive panes (WezTerm's inactive_pane_hsb equivalent) ─────────
# tmux limitation: only default-colored text is dimmed; explicitly colored
# text (prompt, nvim…) keeps its colors.
set -g window-style 'fg=#7f849c,bg=#181825'
set -g window-active-style 'fg=terminal,bg=terminal'

# ─── Status bar: top, Catppuccin Mocha ──────────────────────────────────────
set -g status-position top
set -g @catppuccin_flavor "mocha"
set -g @catppuccin_window_status_style "rounded"
# Active tab = continuous mauve pill (like WezTerm). Catppuccin splits the tab
# into two segments (number + text): force both backgrounds to mauve to weld
# the pill, and the text to @thm_crust (dark) to stay readable.
set -g @catppuccin_window_current_number_color "#{@thm_mauve}"
set -g @catppuccin_window_current_text_color "#{@thm_mauve}"
# Tabs: current folder + command. The claude CLI's process name is its version
# number (versioned binary): "digits/dots only" → "claude".
set -g @catppuccin_window_text " 📂 #{b:pane_current_path} $ #{?#{m/r:^[0-9.]+$,#{pane_current_command}},claude,#{pane_current_command}}"
set -g @catppuccin_window_current_text "#[fg=#{@thm_crust}] 📂 #{b:pane_current_path} $ #{?#{m/r:^[0-9.]+$,#{pane_current_command}},claude,#{pane_current_command}}"
set -g @catppuccin_date_time_text " %d/%m %H:%M"

# Modules (set BEFORE tpm: continuum hooks itself onto status-right)
set -g status-left ""
set -g status-right-length 100
set -g status-right "#{E:@catppuccin_status_session}"
set -ag status-right "#{E:@catppuccin_status_date_time}"

# ─── Plugins (TPM) ──────────────────────────────────────────────────────────
setenv -g TMUX_PLUGIN_MANAGER_PATH "$HOME/.config/tmux/plugins"

set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'
set -g @plugin 'catppuccin/tmux#v2.1.3'
set -g @plugin 'tmux-plugins/tmux-yank'
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'tmux-plugins/tmux-continuum'   # keep last

set -g @continuum-restore 'on'                 # auto-restore on server start
set -g @continuum-save-interval '5'            # autosave every 5 min (default 15)

# Bootstrap on a fresh machine (e.g. after chezmoi update): clone TPM if missing
# and install every declared plugin, so the box themes itself without a manual
# "prefix + I".
if "test ! -d $HOME/.config/tmux/plugins/tpm" {
  display-message "⏳ Installing tmux plugins…"
  run "git clone https://github.com/tmux-plugins/tpm $HOME/.config/tmux/plugins/tpm \
       && $HOME/.config/tmux/plugins/tpm/bin/install_plugins"
}

run "$HOME/.config/tmux/plugins/tpm/tpm"
